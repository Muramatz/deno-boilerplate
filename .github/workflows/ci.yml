name: CI

on:
  pull_request:
    branches: [main]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno audit --frozen --lock=deno.lock --level=critical

  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno install
      - name: Generate Prisma Client
        run: deno run -A --allow-scripts=npm:prisma@7.4.2,npm:@prisma/engines@7.4.2 npm:prisma generate
        working-directory: packages/api
        env:
          DATABASE_URL: 'postgresql://unused:unused@localhost:5432/unused'
      - name: Upload dependencies artifact
        uses: actions/upload-artifact@v4
        with:
          name: deno-deps
          path: |
            node_modules
            packages/api/node_modules
            packages/api/generated
            packages/web/node_modules
          if-no-files-found: ignore
          retention-days: 1

  lint-and-format:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Download dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: deno-deps
      - run: deno lint
      - run: deno fmt --check

  typecheck:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Download dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: deno-deps
      - run: deno task --filter '@app/api' check
      - run: deno task --filter '@app/web' check

  test-api:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Download dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: deno-deps
      - run: deno task --filter '@app/api' test

  build-web:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Download dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: deno-deps
      - run: deno task build:web
