name: CI

on:
  pull_request:
    branches: [main]

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno install
      - name: Upload dependencies artifact
        uses: actions/upload-artifact@v4
        with:
          name: deno-deps
          path: |
            node_modules
            packages/api/node_modules
            packages/web/node_modules
          if-no-files-found: ignore
          retention-days: 1

  lint-and-format:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Download dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: deno-deps
      - run: deno lint
      - run: deno fmt --check

  typecheck:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Download dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: deno-deps
      - run: deno task --filter '@app/api' check
      - run: deno task --filter '@app/web' check

  test-api:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Download dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: deno-deps
      - run: deno task --filter '@app/api' test

  build-web:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Download dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: deno-deps
      - run: deno task build:web
