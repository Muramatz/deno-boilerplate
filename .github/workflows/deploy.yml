name: Deploy

on:
  push:
    branches: [main]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno audit --frozen --lock=deno.lock --level=critical

  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno install
      - name: Generate Prisma Client
        run: deno run -A npm:prisma generate
        working-directory: packages/api
        env:
          DATABASE_URL: 'postgresql://unused:unused@localhost:5432/unused'
      - name: Upload dependencies artifact
        uses: actions/upload-artifact@v4
        with:
          name: deno-deps
          path: |
            node_modules
            packages/api/node_modules
            packages/api/generated
            packages/web/node_modules
          if-no-files-found: ignore
          retention-days: 1

  lint-and-format:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Download dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: deno-deps
      - run: deno lint
      - run: deno fmt --check

  typecheck:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Download dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: deno-deps
      - run: deno task --filter '@app/api' check
      - run: deno task --filter '@app/web' check

  test-api:
    runs-on: ubuntu-latest
    needs: [prepare]
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Download dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: deno-deps
      - name: Push schema to test DB
        run: deno run -A npm:prisma db push
        working-directory: packages/api
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/app_test'
      - run: deno task --filter '@app/api' test
        env:
          TEST_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/app_test'

  deploy:
    runs-on: ubuntu-latest
    needs: [security-audit, lint-and-format, typecheck, test-api]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Download dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: deno-deps
      - run: deno task build:web
      - name: Validate deploy configuration
        run: |
          if [ -z "${{ secrets.DENO_DEPLOY_TOKEN }}" ]; then
            echo "::error::Missing GitHub Actions secret: DENO_DEPLOY_TOKEN"
            exit 1
          fi
          if [ -z "${{ vars.DENO_DEPLOY_PROJECT }}" ]; then
            echo "::error::Missing GitHub Actions variable: DENO_DEPLOY_PROJECT"
            exit 1
          fi
      - name: Deploy to Deno Deploy
        run: |
          deno run -A jsr:@deno/deployctl deploy \
            --token="${{ secrets.DENO_DEPLOY_TOKEN }}" \
            --project="${{ vars.DENO_DEPLOY_PROJECT }}" \
            --entrypoint="packages/api/src/index.ts" \
            --include="packages/api" \
            --include="packages/web/dist" \
            --include="deno.json" \
            --include="deno.lock" \
            --exclude="node_modules" \
            --exclude="packages/web/src" \
            --exclude="packages/web/node_modules" \
            --exclude="packages/api/prisma" \
            --exclude=".claude" \
            --exclude="docs" \
            --prod
