name: Deploy

on:
  push:
    branches: [main]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno install
      - run: deno lint
      - run: deno fmt --check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno install
      - run: deno task --filter '@app/api' check
      - run: deno task --filter '@app/web' check

  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno install
      - run: deno task --filter '@app/api' test

  deploy:
    runs-on: ubuntu-latest
    needs: [lint-and-format, typecheck, test-api]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno install
      - run: deno task build:web
      - name: Deploy to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: ${{ vars.DENO_DEPLOY_PROJECT }}
          entrypoint: 'packages/api/src/index.ts'
          root: '.'
          include: 'packages/api,packages/web/dist,deno.json,deno.lock'
          exclude: 'node_modules,packages/web/src,packages/web/node_modules,.claude,docs'
